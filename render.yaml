# Render Blueprint — Web Service from repo root (Root Directory: leave empty / .)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: codebase-investigator
    runtime: node
    plan: free
    region: oregon
    # Explicit build keeps Blueprint working even without a npm "build:render" script name.
    buildCommand: npm install --include=dev && node scripts/productionBuild.mjs
    startCommand: node server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
